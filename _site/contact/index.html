<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta content="IE=edge" http-equiv="X-UA-Compatible">
  <meta content="width=device-width,initial-scale=1" name="viewport">
  <meta content="Personal Website of Thomas Williams" name="description">
  <meta name="google" content="notranslate" />
  <meta content="Thomas Williams" name="author">
  <meta name="msapplication-tap-highlight" content="no">
  <link href="/assets/favicon.ico" rel="icon">
  <title>Contact</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:900|Roboto+Mono:300,400,700">
  <link rel="stylesheet" href="/css/styles.css">
  
</head>

<body class="">
<div id="site-border-left"></div>
<div id="site-border-right"></div>
<div id="site-border-top"></div>
<div id="site-border-bottom"></div>

<header>
  <nav class="navbar navbar-fixed-top navbar-default">
    <div class="container">
      <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#navbar-collapse" aria-expanded="false">
        <span class="sr-only">Toggle navigation</span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbar-collapse">
        <ul class="nav navbar-nav">
          <li><a href="/" title="">Home</a></li>
          <li><a href="/research/" title="">Research</a></li>
          <li><a href="/about/" title="">About me</a></li>
          <li><a href="/cv/" title="">CV</a></li>
          <li><a href="/contact/" title="">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>
</header>

<div class="section-container">
  <div class="container">
    <div class="row">
      <div class="col-xs-12">

        <div class="row">
          <div class="col-md-10 col-md-offset-1">
            <div class="row">
              <div class="col-xs-12 col-md-6">
                <h3>Contact Me</h3>
                <form action="https://formspree.io/f/xojpkyba" method="POST" class="contact-form">
                  <div class="form-row">
                    <div class="form-group form-group-half">
                      <label for="first-name" class="sr-only">First Name</label>
                      <input type="text" id="first-name" name="first-name" placeholder="First Name" autocomplete="given-name">
                    </div>
                    <div class="form-group form-group-half">
                      <label for="last-name" class="sr-only">Last Name</label>
                      <input type="text" id="last-name" name="last-name" placeholder="Last Name" autocomplete="family-name">
                    </div>
                  </div>

                  <div class="form-group">
                    <label for="email" class="sr-only">Email</label>
                    <input type="email" id="email" name="email" placeholder="Email *" required autocomplete="email">
                  </div>

                  <div class="form-group">
                    <label for="message" class="sr-only">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Write a message"></textarea>
                  </div>

                  <button type="submit" class="btn-submit">Submit</button>
                </form>
              </div>

              <div class="col-xs-12 col-md-6">
                <img src="/assets/images/Iceland.png"
                     style="width: 75%; display: block; margin-left: auto; margin-right: auto;"
                     alt="Iceland"
                     loading="lazy">
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>




<script src="/js/main.js"></script>
</body>

</html>
